<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downland</title>
    <style>
        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body
        {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #060c21;
        }
        .btn
        {
            position: relative;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            width: 200px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50px;
            padding-left: 40px;
            border: 0.5px sloid rgba(255,255,255,0.35);
            transition: 0.5s;
            overflow: hidden;
        }
        .btn::after
        {
            content: '';
            position: absolute;
            height: 100%;
            width: 80px;
            background-color: rgba(255,255,255,0.5);
            z-index: 1;
            transform: translateX(-170px) skewX(30deg);
            transition: 0.75 ease-in-out;
        }
        .btn:hover::after
        {
            transform: translateX(170px) skewX(30deg);
        }
        .btn:hover
        {
            padding-left: 0;
            padding-right: 40px;
            color: #ff0055;
        }
        .btn span
        {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #ff0055;
            border-radius: 50%;
            left: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s ease-in-out;
        }
        .btn:hover span
        {
            left: calc(100% -55px);
            background-color: #fff;
        }
       
    </style>
</head>
<body>
    <a href="#" class="btn">Downland<span></span></a>
</body>
</html>
